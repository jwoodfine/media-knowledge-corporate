# leapfrog-facts.es.yaml — Panel "¿Sabías que?" para corporate.woodfinegroup.com
#
# El motor lee este archivo en cada solicitud; si está ausente, suprime el panel.
# El operador rota los hechos mensualmente; los más recientes van al inicio.
# Cada hecho debe citar un slug publicado y contener una afirmación
# independientemente verificable.
# Lector: comunidad financiera institucional. Cada hecho debe llevar al
# lector de "nunca había oído hablar de estas estructuras" a "un momento,
# esto no es como funciona habitualmente el sector inmobiliario comercial
# en fondos mancomunados".
